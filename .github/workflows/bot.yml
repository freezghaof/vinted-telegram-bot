name: Vinted Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"   # toutes les heures

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 59

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install requirements
        run: |
          pip install -r requirements.txt

      - name: Run bot
        run: |
          python bot.py
